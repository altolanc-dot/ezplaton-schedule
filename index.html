// ── 일별 교습비 추이(히스토리 누적) ─────────────────────────
function snapshotRevenue(){
  if(!S.revHistory)S.revHistory={};
  const rows=calcStudentsPerSlot();
  const total=rows.reduce((a,r)=>a+(r.free?0:r.fee),0);
  const todayKey=new Date().toISOString().split("T")[0];
  // 가장 최근 스냅샷 값과 비교해서 달라졌을 때만 저장
  const histKeys=Object.keys(S.revHistory).sort();
  const lastVal=histKeys.length?S.revHistory[histKeys[histKeys.length-1]]:null;
  if(lastVal!==total){
    S.revHistory[todayKey]=total;
  }
}
function calcDailyRevenue(){
  if(!S.revHistory)S.revHistory={};
  const now=new Date();
  const todayKey=now.toISOString().split("T")[0];
  snapshotRevenue();
  const start=new Date(now);start.setMonth(start.getMonth()-6);start.setDate(1);
  const end=new Date(now);end.setMonth(end.getMonth()+6);end.setDate(1);end.setMonth(end.getMonth()+1);end.setDate(0);
  const result=[];
  let lastVal=null;
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    const dk=d.toISOString().split("T")[0];
    const label=(d.getMonth()+1)+"/"+d.getDate();
    if(dk>todayKey){result.push({date:dk,label,total:null,isSnap:false});continue;}
    const isSnap=S.revHistory[dk]!==undefined;
    if(isSnap)lastVal=S.revHistory[dk];
    result.push({date:dk,label,total:lastVal,isSnap});
  }
  return result;
}

};

  const existing=S.sched[dateKey]||"";
  modal.appendChild(mkTitle("📝",dateKey+" 일정 메모"));
  const ta=Ta({className:"field-input",rows:"5",placeholder:"오늘의 주요 학원 일정을 입력하세요..."},[existing]);
  modal.appendChild(ta);
  const br=D({className:"modal-row"});
  if(existing){
    br.appendChild(Bt({className:"btn btn-ghost",style:{color:"#d04040"},onClick:()=>{delete S.sched[dateKey];ov.remove();render();}},["🗑 삭제"]));
  }
  br.appendChild(Bt({className:"btn btn-ghost",onClick:()=>ov.remove()},["취소"]));
  br.appendChild(Bt({className:"btn btn-primary",onClick:()=>{
    const v=ta.value.trim();
    if(v)S.sched[dateKey]=v;else delete S.sched[dateKey];
    ov.remove();render();
  }},["💾 저장"]));
  modal.appendChild(br);
  ov.appendChild(modal);document.body.appendChild(ov);
}

// ── 자동 저장(디바운스, 데이터 변경시에만) ─────────────────
function scheduleAutoSave(){
  if(!db||isApplyingRemote||!firstSnapshotReceived)return;
  const cur=JSON.stringify(packData());
  if(cur===lastSavedJSON)return; // 변경 없음 → 재저장/재렌더 루프(=그래프 깜빡임) 방지
  S.saveStatus="⏳ 저장 대기 중...";updateSyncBadge();
  clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(async()=>{
    try{
      const payload=JSON.parse(cur);
      payload._writer=MY_ID;payload._ts=Date.now();
      await db.collection(FB_COL).doc(FB_DOC).set(payload);
      lastSavedJSON=cur;
      localSave();
      S.saveStatus="🟢 자동 동기화됨 "+new Date().toLocaleTimeString();
    }catch(e){console.error(e);S.saveStatus="❌ 자동 저장 실패";}
    updateSyncBadge();
  },1200);
}
// ── 실시간 동기화(다른 기기 변경 자동 반영) ────────────────
function setupRealtimeSync(){
  if(!db)return;
  db.collection(FB_COL).doc(FB_DOC).onSnapshot(doc=>{
    if(!doc.exists){
      firstSnapshotReceived=true;
      if(!S.loaded)render();
      return;
    }
    const data=doc.data();
    if(data._writer===MY_ID){
      // 내가 보낸 변경의 echo: 다시 그릴 필요 없음
      firstSnapshotReceived=true;
      return;
    }
    isApplyingRemote=true;
    applyData(data);
    lastSavedJSON=JSON.stringify(packData()); // 방금 받은 데이터를 기준점으로 설정 → 되돌려 보내지 않음
    firstSnapshotReceived=true;
    S.saveStatus="🟢 동기화됨 "+new Date().toLocaleTimeString();
    render();
    isApplyingRemote=false;
  },err=>{console.error(err);S.saveStatus="❌ 동기화 연결 실패";updateSyncBadge();});
}
function initLoad(){
  localLoad();
  S.loaded=true;
  if(db){S.saveStatus="🔌 연결 중...";setupRealtimeSync();}
  else firstSnapshotReceived=true;
  render();
}

// ── 파생 계산 ─────────────────────────────────────────────
function calcStudents(){
  const m={};
  S.sch.forEach(slot=>{
    (slot.names||[]).forEach(n=>{
      const ps=(slot.perStudent&&slot.perStudent[n])||{};
      const cat=ps.cat||slot.cat;
      if(!m[n])m[n]={name:n,slots:[]};
      m[n].slots.push({cat,fee:ps.fee,slotGrade:slot.grade});
    });
  });
  return Object.values(m).map(s=>{
    const meta=S.meta[s.name]||{};
    const free=!!meta.free;
    const grade=meta.grade||s.slots[0]?.slotGrade||"";
    // 슬롯별로 집계
    const monthly=free?0:s.slots.reduce((a,sl)=>{
      const fee=sl.fee!==undefined?sl.fee:(meta.fee!==undefined?Number(meta.fee):(S.bf[sl.cat]||0));
      return a+fee;
    },0);
    // 대표 분류: 가장 많이 등장하는 cat
    const catCount={};s.slots.forEach(sl=>{catCount[sl.cat]=(catCount[sl.cat]||0)+1;});
    const cat=Object.keys(catCount).sort((a,b)=>catCount[b]-catCount[a])[0]||"초등_플라톤";
    const fee=free?0:(s.slots[0]?.fee!==undefined?s.slots[0].fee:(meta.fee!==undefined?Number(meta.fee):(S.bf[cat]||0)));
    return{name:s.name,cat,grade,free,wc:s.slots.length,fee,monthly,memo:meta.memo||"",regDate:meta.regDate||""};
  });
}
// ── 슬롯별 학생 분류/교습비 집계 (교습비 현황용) ─────────────
function calcStudentsPerSlot(){
  const rows=[];
  S.sch.forEach(slot=>{
    (slot.names||[]).forEach(n=>{
      const ps=(slot.perStudent&&slot.perStudent[n])||{};
      const meta=S.meta[n]||{};
      const free=!!meta.free;
      const cat=ps.cat||slot.cat;
      const fee=free?0:(ps.fee!==undefined?ps.fee:(meta.fee!==undefined?Number(meta.fee):(S.bf[cat]||0)));
      const grade=meta.grade||slot.grade;
      rows.push({name:n,cat,grade,free,fee,slotId:slot.id});
    });
  });
  return rows;
}
function buildCellMaps(){
  const cmap={},smap={};
  S.sch.forEach(s=>{
    if(!(s.names&&s.names.length))return;
    const k=`${s.time}_${s.day}`;
    if(!cmap[k])cmap[k]=s;
    if(s.span>1){const ti=AK.indexOf(s.time);for(let i=1;i<s.span;i++)if(AK[ti+i])smap[`${AK[ti+i]}_${s.day}`]=true;}
  });
  return{cmap,smap};
}

function calcMonthlyRevenue(){
  const now=new Date();
  const curYM=toYM(now);
  const stList=calcStudents();
  return Array.from({length:12},(_,i)=>toYM(new Date(now.getFullYear(),i,1))).map(ym=>{
    if(ym<curYM)return{ym,label:Number(ym.split("-")[1])+"월",total:null};
    let total=0;
    stList.forEach(st=>{
      if(st.free)return;
      const reg=S.meta[st.name]?.regDate;
      if(reg&&reg.slice(0,7)>ym)return;
      total+=st.monthly;
    });
    return{ym,label:Number(ym.split("-")[1])+"월",total};
  });
}
function calcCategoryHours(){
  const hrs={};
  S.sch.forEach(slot=>{
    if(!slot.names||!slot.names.length)return;
    const h=(slot.span||2)/2;
    const perStudent=slot.perStudent||{};
    const hasPer=slot.names.some(n=>perStudent[n]?.cat&&perStudent[n].cat!==slot.cat);
    if(hasPer){
      // 학생별 분류가 다른 경우: 슬롯 시간을 학생 수로 나눠 각 분류에 배분
      slot.names.forEach(n=>{
        const cat=(perStudent[n]?.cat)||slot.cat;
        hrs[cat]=(hrs[cat]||0)+h/slot.names.length;
      });
    } else {
      // 모두 같은 분류: 슬롯 시간 그대로
      hrs[slot.cat]=(hrs[slot.cat]||0)+h;
    }
  });
  return hrs;
}

// ── DOM 헬퍼 ─────────────────────────────────────────────
const h=(tag,attrs,children=[])=>{
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function")el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v);
  });
  children.forEach(c=>{
    if(c==null)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return el;
};

function openCellModal(time,day){
  const{cmap}=buildCellMaps();
  const slot=cmap[`${time}_${day}`];
  let ms={
    time,day,sid:slot?.id||null,
    grade:slot?.grade||"",cat:slot?.cat||"초등_플라톤",
    nt:slot?(slot.names||[]).join("\n"):"",
    span:String(slot?.span||2),stInfos:[]
  };
  const buildSI=(names,cat,slot)=>names.map(n=>{
    const meta=S.meta[n]||{};const free=!!meta.free;
    const ps=(slot?.perStudent&&slot.perStudent[n])||{};
    const indCat=ps.cat||cat;
    const fee=free?0:(ps.fee!==undefined?ps.fee:(meta.fee!==undefined?meta.fee:(S.bf[indCat]||0)));
    return{name:n,free,fee,cat:indCat};
  });
  const syncSI=(nt,cat,cur)=>nt.split("\n").map(n=>n.trim()).filter(Boolean).map(n=>cur.find(i=>i.name===n)||buildSI([n],cat,slot)[0]);
  if(slot)ms.stInfos=buildSI(slot.names,slot.cat,slot);

  const ov=mkOv(close);const modal=mkModal(440);
  function close(){ov.remove();}
      function confirm(){
    const names=ms.nt.split("\n").map(n=>n.trim()).filter(Boolean);
    const sp=Math.max(1,parseInt(ms.span)||2);
    if(!names.length){S.sch=S.sch.filter(s=>!(s.time===time&&s.day===day));close();render();return;}
    // perStudent: 슬롯 기본 분류와 다른 경우만 저장
    const perStudent={};
    ms.stInfos.forEach(si=>{
      const entry={};
      if(si.cat!==ms.cat)entry.cat=si.cat;
      if(!si.free)entry.fee=si.fee;
      if(Object.keys(entry).length)perStudent[si.name]=entry;
    });

function renderCombinedStatCard(){
  const stList=calcStudents();
  const rows=calcStudentsPerSlot();
  // 분류별 집계
  const catMap={};
  rows.forEach(r=>{
    if(!catMap[r.cat])catMap[r.cat]={students:{},total:0};
    if(!catMap[r.cat].students[r.name])catMap[r.cat].students[r.name]={name:r.name,cat:r.cat,grade:r.grade,free:r.free,monthly:0,wc:0};
    catMap[r.cat].students[r.name].monthly+=r.free?0:r.fee;
    catMap[r.cat].students[r.name].wc++;
    catMap[r.cat].total+=r.free?0:r.fee;
  });
  const grand=Object.values(catMap).reduce((a,c)=>a+c.total,0);
  const catTotals=CATS.map(c=>({...c,students:Object.values(catMap[c.key]?.students||{}),total:catMap[c.key]?.total||0})).filter(c=>c.students.length>0);

  const tb=h("tbody",{});
  catTotals.forEach((cat,ci)=>{
    const cc=CC[cat.key];
    const gm={};cat.students.forEach(s=>{if(!gm[s.grade])gm[s.grade]=[];gm[s.grade].push(s);});
    const grades=Object.keys(gm).sort();

      ]));
      tr.appendChild(h("td",{style:{whiteSpace:"nowrap"}},[Sp({style:{color:cc.t,fontWeight:"700",fontSize:"12px"}},[gr]),Sp({style:{color:TS,fontSize:"11px",marginLeft:"2px"}},["("+lst.length+"명)"])]));
      const chips=D({style:{display:"flex",flexWrap:"wrap",gap:"4px"}});
      lst.forEach(s=>{
        const chip=D({className:"st-chip",style:{background:cc.li,border:`1.5px solid ${cc.bd}`},onClick:()=>openStudentModal(s.name,s.cat,s.grade)});
        chip.appendChild(Sp({style:{color:TM,fontWeight:"700"}},[s.name]));
        chip.appendChild(Sp({style:{fontSize:"10px",color:TS,marginLeft:"2px"}},[s.free?"무료":"주"+s.wc+"회·"+s.monthly.toLocaleString()+"원"]));
        chips.appendChild(chip);

      tr.appendChild(h("td",{},[chips]));
      tr.appendChild(h("td",{style:{textAlign:"right",color:GOLD,fontWeight:"700",fontSize:"12px",whiteSpace:"nowrap"}},[sub.toLocaleString()+"원"]));
      if(gi===0){
        const pTd=h("td",{rowspan:String(grades.length),style:{textAlign:"right",verticalAlign:"middle"}});
        const pb=D({style:{display:"flex",alignItems:"center",gap:"6px",justifyContent:"flex-end"}});

        pb.appendChild(Sp({style:{fontSize:"11px",color:TS,minWidth:"30px"}},[pct+"%"]));

            nl.addEventListener("mouseleave",()=>{if(!isMatch)nl.style.background="transparent";});

            if(!dragId)return;

      });

    sumTd.appendChild(Sp({style:{color:"#3a9a5c"}},[O+"출 "]));
    sumTd.appendChild(Sp({style:{color:"#d04040"}},[X+"결 "]));
    sumTd.appendChild(Sp({style:{color:"#e08020"}},[Dv+"보"]));
    tr.appendChild(sumTd);tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);tblWrap.appendChild(tbl);attCard.appendChild(tblWrap);
  const leg=D({style:{display:"flex",gap:"12px",padding:"12px 20px",borderTop:"1px solid #f0ebe0",fontSize:"11px",color:TS}});
  [{v:"O",c:"#3a9a5c",bg:"#dcf2e8",t:"출석"},{v:"X",c:"#d04040",bg:"#fce4e4",t:"결석"},{v:"D",c:"#e08020",bg:"#fef3de",t:"보강"}].forEach(item=>{
    leg.appendChild(D({style:{display:"flex",alignItems:"center",gap:"4px"}},[Sp({style:{fontWeight:"800",color:item.c,background:item.bg,borderRadius:"4px",padding:"1px 7px"}},[item.v]),Sp({},[item.t])]));
  });
  leg.appendChild(Sp({style:{color:"#ccc"}},["  셀 클릭: ·→O→X→D→삭제"]));
  attCard.appendChild(leg);wrap.appendChild(attCard);
  return wrap;
}

// ── 탭: 통계 ────────────────────────────────────────────
function renderChart(){
  chartInst.forEach(c=>{try{c.destroy();}catch(e){}});chartInst=[];
  const stList=calcStudents();
  const slotRows2=calcStudentsPerSlot();
  const catFeeMap2={};
  slotRows2.forEach(r=>{
    if(!catFeeMap2[r.cat])catFeeMap2[r.cat]=0;
    catFeeMap2[r.cat]+=r.free?0:r.fee;
  });
  const grand=Object.values(catFeeMap2).reduce((a,b)=>a+b,0);
  const wrap=D({});

  const sumCard=D({className:"card"});
  sumCard.appendChild(D({className:"card-head"},[Sp({className:"card-title"},["👥 학생수 요약"])]));
  const sg=D({className:"summary-grid",style:{gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))"}});
  const SHORT_LABEL={초등_플라톤:"플라톤",초등_이지:"초등이지",중등_이지:"중등이지",중등_이지수능:"중등이지수능",고등_이지수능:"고등이지",고등_개인:"고등개인"};
  const sumCatTotals=CATS.map(c=>({key:c.key,total:stList.filter(s=>s.cat===c.key).reduce((a,s)=>a+s.monthly,0),cnt:stList.filter(s=>s.cat===c.key).length})).filter(c=>c.cnt>0);
  const sumItems=[{l:"총 학생수",cnt:stList.length}];
  sumCatTotals.forEach(c=>sumItems.push({l:SHORT_LABEL[c.key]||c.key,cnt:c.cnt}));
  sumItems.forEach(item=>{
    const si=D({className:"summary-item"});
    si.appendChild(D({className:"summary-val"},[item.cnt+"명"]));
    si.appendChild(D({className:"summary-sub"},[item.l]));
    sg.appendChild(si);
  });
  sumCard.appendChild(sg);wrap.appendChild(sumCard);
  wrap.appendChild(renderCombinedStatCard());

  const chartCard=D({className:"card"});
  chartCard.appendChild(D({className:"card-head"},[Sp({className:"card-title"},["📈 통계 차트"])]));
  const cGrid=D({className:"chart-grid"});
  const feeBox=D({className:"chart-box"});const feeCanvas=h("canvas",{});feeBox.appendChild(feeCanvas);cGrid.appendChild(feeBox);
  const hourBox=D({className:"chart-box"});const hourCanvas=h("canvas",{});hourBox.appendChild(hourCanvas);cGrid.appendChild(hourBox);
  const barBox=D({className:"chart-box",style:{gridColumn:"1 / -1"}});const barCanvas=h("canvas",{});barBox.appendChild(barCanvas);cGrid.appendChild(barBox);
  chartCard.appendChild(cGrid);
  wrap.appendChild(chartCard);

  setTimeout(()=>{
    const barLabelPlugin=(fmt)=>({
      id:'barLabel'+Math.random().toString(36).slice(2),
      afterDatasetsDraw(chart){
        const{ctx}=chart;
        chart.data.datasets.forEach((dataset,i)=>{
          const meta=chart.getDatasetMeta(i);
          const total=dataset.data.reduce((a,b)=>a+b,0);
          meta.data.forEach((bar,index)=>{
            const value=dataset.data[index];
            ctx.save();
            ctx.fillStyle="#555";
            ctx.font="700 11px 'Apple SD Gothic Neo',sans-serif";
            ctx.textAlign="left";
            ctx.textBaseline="middle";
            ctx.fillText(fmt(value,total),bar.x+6,bar.y);
            ctx.restore();
          });
        });
      }
    });
    const lineLabelPlugin={
      id:'lineLabel',
      afterDatasetsDraw(chart){
        const{ctx}=chart;
        chart.data.datasets.forEach((dataset)=>{
          const meta=chart.getDatasetMeta(0);
          meta.data.forEach((point,index)=>{
            const value=dataset.data[index];
            if(value==null||!point)return;
            ctx.save();
            ctx.fillStyle="#b8872a";
            ctx.font="700 11px sans-serif";
            ctx.textAlign="center";
            ctx.textBaseline="bottom";
            ctx.fillText((value/10000).toFixed(0)+"만",point.x,point.y-8);
            ctx.restore();
          });
        });
      }
    };

    // 교습비 차트: calcStudentsPerSlot 기반으로 분류별 집계
    const slotRows=calcStudentsPerSlot();
    const catFeeMap={};
    slotRows.forEach(r=>{
      if(!catFeeMap[r.cat])catFeeMap[r.cat]=0;
      catFeeMap[r.cat]+=r.free?0:r.fee;
    });
    const grandTotal=Object.values(catFeeMap).reduce((a,b)=>a+b,0);
    const feeData=CATS.map(c=>({label:c.label,val:catFeeMap[c.key]||0,color:CC[c.key].t,bg:CC[c.key].bg})).filter(d=>d.val>0).sort((a,b)=>b.val-a.val);
    chartInst.push(new Chart(feeCanvas,{type:"bar",data:{labels:feeData.map(d=>d.label),datasets:[{label:"교습비 합계",data:feeData.map(d=>d.val),backgroundColor:feeData.map(d=>d.bg),borderColor:feeData.map(d=>d.color),borderWidth:2,borderRadius:6}]},options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,layout:{padding:{right:75}},plugins:{legend:{display:false},title:{display:true,text:"분류별 교습비 비중 (높은순)  |  합계: "+(grandTotal/10000).toFixed(0)+"만원",font:{size:13,weight:"bold"},color:"#555"}},scales:{x:{beginAtZero:true,ticks:{callback:v=>v===0?"0":(v/10000).toFixed(0)+"만",font:{size:10}},grid:{color:"#f0ebe0"}},y:{grid:{display:false},ticks:{font:{size:11}}}}},plugins:[barLabelPlugin((v,t)=>(v/10000).toFixed(0)+"만 ("+(grandTotal>0?Math.round(v/grandTotal*100):0)+"%)")]}));

    const catHours=calcCategoryHours();
    const hourData=CATS.map(c=>({label:c.label,val:catHours[c.key]||0,color:CC[c.key].t,bg:CC[c.key].bg})).filter(d=>d.val>0)
      .sort((a,b)=>b.val-a.val);
    const totalHours=Object.values(catHours).reduce((a,b)=>a+b,0);
    chartInst.push(new Chart(hourCanvas,{type:"bar",data:{labels:hourData.map(d=>d.label),datasets:[{label:"주간 교습시간",data:hourData.map(d=>d.val),backgroundColor:hourData.map(d=>d.bg),borderColor:hourData.map(d=>d.color),borderWidth:2,borderRadius:6}]},options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,layout:{padding:{right:75}},plugins:{legend:{display:false},title:{display:true,text:"분류별 주간 교습시간 (높은순)  |  합계: "+totalHours+"h",font:{size:13,weight:"bold"},color:"#555"}},scales:{x:{beginAtZero:true,ticks:{callback:v=>v+"h",font:{size:10}},grid:{color:"#f0ebe0"}},y:{grid:{display:false},ticks:{font:{size:11}}}}},plugins:[barLabelPlugin((v,t)=>v+"h ("+(t>0?Math.round(v/t*100):0)+"%)")]}));

    const daily=calcDailyRevenue();
    const validVals=daily.map(d=>d.total).filter(v=>v!=null);
    const minV=validVals.length?Math.min(...validVals):0;
    const maxV=validVals.length?Math.max(...validVals):5000000;
    const padding=(maxV-minV)||500000;
    const yMin=Math.max(0,Math.floor((minV-padding*0.5)/100000)*100000);
    const yMax=Math.ceil((maxV+padding*0.5)/100000)*100000;
    // 포인트: 값이 바뀌는 시점(첫날)과 바뀌기 직전날(마지막날)만 표시
    const snapIndices=new Set();
    const dataVals=daily.map(d=>d.total);
    for(let i=0;i<dataVals.length;i++){
      if(dataVals[i]==null)continue;
      const prev=dataVals[i-1];
      const next=dataVals[i+1];
      // 값이 시작되는 지점 (이전이 null이거나 값이 다를 때)
      if(prev==null||prev!==dataVals[i])snapIndices.add(i);
      // 값이 끝나는 지점 (다음이 null이거나 값이 다를 때)
      if(next==null||next!==dataVals[i])snapIndices.add(i);
    }
    chartInst.push(new Chart(barCanvas,{type:"line",data:{labels:daily.map(d=>d.label),datasets:[{label:"교습비",data:daily.map(d=>d.total),borderColor:"#b8872a",backgroundColor:"rgba(184,135,42,.06)",borderWidth:2,pointBackgroundColor:"#b8872a",pointRadius:ctx=>snapIndices.has(ctx.dataIndex)?5:0,pointHoverRadius:7,tension:0,fill:false,spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:24}},plugins:{legend:{display:false},title:{display:true,text:"교습비 변동 추이 (전6개월~후6개월)",font:{size:13,weight:"bold"},color:"#555"},tooltip:{mode:"index",intersect:false,callbacks:{label:ctx=>ctx.raw==null?"":(ctx.raw/10000).toFixed(0)+"만원"}}},scales:{y:{min:yMin,max:yMax,ticks:{callback:v=>(v/10000).toFixed(0)+"만",font:{size:10}},grid:{color:"#f0ebe0"}},x:{grid:{display:false},ticks:{font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:13}}}},plugins:[lastLabelPlugin]}));
  },60);
  return wrap;
}

// ── 메인 렌더 ────────────────────────────────────────────
function render(){
  const root=document.getElementById("app");
  root.innerHTML="";

  const hdr=h("header",{});
  hdr.appendChild(D({},[Sp({className:"logo"},["플라톤 이지 국어"])]));
  const hdrRight=D({className:"hdr-right",style:{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}});
  const badge=Sp({className:"save-badge",id:"syncBadge"},[S.saveStatus||""]);
  applyBadgeStyle(badge,S.saveStatus);
  hdrRight.appendChild(badge);
  hdrRight.appendChild(Bt({className:"btn no-print",style:{background:"#03C75A",color:"#fff"},onClick:()=>window.open("https://m.blog.naver.com/easy-ssaem?tab=1","_blank")},["📝 블로그"]));
  hdrRight.appendChild(Bt({className:"btn btn-ghost no-print",onClick:openExportModal},["📤 내보내기"]));
  hdrRight.appendChild(Bt({className:"btn btn-ghost no-print",onClick:()=>window.print()},["🖨️ 인쇄"]));
  hdrRight.appendChild(Bt({className:"btn btn-ghost no-print",onClick:openFeeModal},["⚙️ 기본 교습비"]));
  hdr.appendChild(hdrRight);root.appendChild(hdr);

  const mainEl=h("main",{});
  const topRow=D({style:{display:"flex",justifyContent:"flex-start",alignItems:"center",flexWrap:"wrap",gap:"10px"}});
  const tabNav=D({className:"tab-nav no-print"});
  [["tt","📅 시간표"],["att","📋 출결"],["chart","📈 통계"]].forEach(([key,label])=>{
    tabNav.appendChild(Bt({className:"tab-btn"+(S.tab===key?" active":""),onClick:()=>{S.tab=key;render();}},[label]));
  });
  topRow.appendChild(tabNav);
  topRow.appendChild(renderSearchBar());
  mainEl.appendChild(topRow);

  if(S.tab==="tt")mainEl.appendChild(renderTT());
  else if(S.tab==="att")mainEl.appendChild(renderAtt());
  else mainEl.appendChild(renderChart());

  root.appendChild(mainEl);
  scheduleAutoSave();
}

// ── 초기화 ───────────────────────────────────────────────
initLoad();
</script>
