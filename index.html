function snapshotRevenue(){
  if(!S.revHistory)S.revHistory={};
  const rows=calcStudentsPerSlot();
  const total=rows.reduce((a,r)=>a+(r.free?0:r.fee),0);
  const todayKey=new Date().toISOString().split("T")[0];
  // 가장 최근 스냅샷 값과 비교해서 달라졌을 때만 저장
  const histKeys=Object.keys(S.revHistory).sort();
  const lastVal=histKeys.length?S.revHistory[histKeys[histKeys.length-1]]:null;
  if(lastVal!==total){
    S.revHistory[todayKey]=total;
  }
}
function calcDailyRevenue(){
  if(!S.revHistory)S.revHistory={};
  const now=new Date();
  const todayKey=now.toISOString().split("T")[0];
  snapshotRevenue();
  const start=new Date(now);start.setMonth(start.getMonth()-6);start.setDate(1);
  const end=new Date(now);end.setMonth(end.getMonth()+6);end.setDate(1);end.setMonth(end.getMonth()+1);end.setDate(0);
  const result=[];
  let lastVal=null;
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    const dk=d.toISOString().split("T")[0];
    const label=(d.getMonth()+1)+"/"+d.getDate();
    if(dk>todayKey){result.push({date:dk,label,total:null,isSnap:false});continue;}
    const isSnap=S.revHistory[dk]!==undefined;
    if(isSnap)lastVal=S.revHistory[dk];
    result.push({date:dk,label,total:lastVal,isSnap});
  }
  return result;
}

function setupRealtimeSync(){
  if(!db)return;
  db.collection(FB_COL).doc(FB_DOC).onSnapshot(doc=>{
    if(!doc.exists){
      firstSnapshotReceived=true;
      if(!S.loaded)render();
      return;
    }
    const data=doc.data();
    if(data._writer===MY_ID){
      // 내가 보낸 변경의 echo: 다시 그릴 필요 없음
      firstSnapshotReceived=true;
      return;
    }
    isApplyingRemote=true;
    applyData(data);
    lastSavedJSON=JSON.stringify(packData()); // 방금 받은 데이터를 기준점으로 설정 → 되돌려 보내지 않음
    firstSnapshotReceived=true;
    S.saveStatus="🟢 동기화됨 "+new Date().toLocaleTimeString();
    render();
    isApplyingRemote=false;
  },err=>{console.error(err);S.saveStatus="❌ 동기화 연결 실패";updateSyncBadge();});
}

// src="main": 기존 정규 시간표 / src="special": 특강 시간표 (완전히 별도 데이터)
function getStore(src){
  if(src==="special")return{sch:S.sch2,setSch:v=>{S.sch2=v;},meta:S.meta2,bf:S.bf2,cats:CATS2,cc:CC2};
  return{sch:S.sch,setSch:v=>{S.sch=v;},meta:S.meta,bf:S.bf,cats:CATS,cc:CC};
}
function calcStudents(src="main"){
  const store=getStore(src);
  const m={};
  store.sch.forEach(slot=>{
    (slot.names||[]).forEach(n=>{
      const ps=(slot.perStudent&&slot.perStudent[n])||{};
      const cat=ps.cat||slot.cat;
      if(!m[n])m[n]={name:n,slots:[]};
      m[n].slots.push({cat,fee:ps.fee,slotGrade:slot.grade,round:ps.round||"1"});
    });
  });
  return Object.values(m).map(s=>{
    const meta=store.meta[s.name]||{};
    const free=!!meta.free;
    const grade=meta.grade||s.slots[0]?.slotGrade||"";
    // 슬롯별로 집계 (특강은 같은 분류가 주 여러 회 반복돼도 1회 금액만 반영 — 패키지 총액 개념)
    let monthly=0;
    if(!free){
      if(src==="special"){
        const seenCat={};
        s.slots.forEach(sl=>{
          const key=sl.cat+"|"+(sl.round||"1");
          if(seenCat[key])return;
          seenCat[key]=true;
          const fee=sl.fee!==undefined?sl.fee:(meta.fee!==undefined?Number(meta.fee):(store.bf[sl.cat]||0));
          monthly+=fee;
        });
      } else {
        monthly=s.slots.reduce((a,sl)=>{
          const fee=sl.fee!==undefined?sl.fee:(meta.fee!==undefined?Number(meta.fee):(store.bf[sl.cat]||0));
          return a+fee;
        },0);
      }
    }
    // 대표 분류: 가장 많이 등장하는 cat
    const catCount={};s.slots.forEach(sl=>{catCount[sl.cat]=(catCount[sl.cat]||0)+1;});
    const cat=Object.keys(catCount).sort((a,b)=>catCount[b]-catCount[a])[0]||store.cats[0].key;
    const fee=free?0:(s.slots[0]?.fee!==undefined?s.slots[0].fee:(meta.fee!==undefined?Number(meta.fee):(store.bf[cat]||0)));
    // 대표 회차: 1회차가 있으면 1회차 우선 (정렬/표시용)
    const round=s.slots.some(sl=>(sl.round||"1")==="1")?"1":"2";
    return{name:s.name,cat,grade,free,wc:s.slots.length,fee,monthly,round,memo:meta.memo||"",regDate:meta.regDate||""};
  });
}
// ── 슬롯별 학생 분류/교습비 집계 (교습비 현황용) ─────────────
function calcStudentsPerSlot(src="main"){
  const store=getStore(src);
  const rows=[];
  store.sch.forEach(slot=>{
    (slot.names||[]).forEach(n=>{
      const ps=(slot.perStudent&&slot.perStudent[n])||{};
      const meta=store.meta[n]||{};
      const free=!!meta.free;
      const cat=ps.cat||slot.cat;
      const fee=free?0:(ps.fee!==undefined?ps.fee:(meta.fee!==undefined?Number(meta.fee):(store.bf[cat]||0)));
      const grade=meta.grade||slot.grade;
      rows.push({name:n,cat,grade,free,fee,slotId:slot.id,round:ps.round||"1"});
    });
  });
  return rows;
}
function buildCellMaps(src="main"){

}

function calcCategoryHours(src="main"){
  const store=getStore(src);
  const hrs={};
  store.sch.forEach(slot=>{
    if(!slot.names||!slot.names.length)return;
    const h=(slot.span||2)/2;
    const perStudent=slot.perStudent||{};
    const hasPer=slot.names.some(n=>perStudent[n]?.cat&&perStudent[n].cat!==slot.cat);
    if(hasPer){
      // 학생별 분류가 다른 경우: 슬롯 시간을 학생 수로 나눠 각 분류에 배분
      slot.names.forEach(n=>{
        const cat=(perStudent[n]?.cat)||slot.cat;
        hrs[cat]=(hrs[cat]||0)+h/slot.names.length;
      });
    } else {
      // 모두 같은 분류: 슬롯 시간 그대로
      hrs[slot.cat]=(hrs[slot.cat]||0)+h;
    }
  });
  return hrs;
}

// ── 오늘 수업 / 검색 ───────────────────────────────────────
function getTodayInfo(){
  const today=new Date();
  const idx=today.getDay()===0?6:today.getDay()-1;
  return{dayName:DAYS[idx],dateKey:today.toISOString().split("T")[0],today};
}
// 특강 기간(7/22~8/19) 중 오늘이 속한 회차 반환 (1회차:7/22~8/04, 2회차:8/05~8/19), 기간 밖이면 null
function getActiveSpecialRound(today){
  const y=today.getFullYear();
  const start=new Date(y,6,22),mid=new Date(y,7,4),end=new Date(y,7,19);
  const t=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  if(t<start||t>end)return null;
  return t<=mid?"1":"2";
}

function renderSearchBar(){

// ── DOM 헬퍼 ─────────────────────────────────────────────
const h=(tag,attrs,children=[])=>{
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function")el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v);
  });
  children.forEach(c=>{
    if(c==null)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return el;
};
const D=(a,c=[])=>h("div",a,c);
const Sp=(a,c=[])=>h("span",a,c);
const Bt=(a,c=[])=>h("button",a,c);
const Inp=(a)=>h("input",a);
const Ta=(a,c=[])=>h("textarea",a,c);
const mkOv=(cb)=>{const o=D({className:"overlay"});o.addEventListener("click",cb);return o;};
const mkModal=(w=400)=>{const m=D({className:"modal",style:{width:w+"px"}});m.addEventListener("click",e=>e.stopPropagation());return m;};
const mkTitle=(icon,txt)=>D({className:"modal-title"},[Sp({},[icon+" "]),document.createTextNode(txt)]);

// ── 셀 모달 ──────────────────────────────────────────────
function openCellModal(time,day,src="main"){
  const store=getStore(src);
  const{cmap}=buildCellMaps(src);
  const slot=cmap[`${time}_${day}`];
  const isSpecial=src==="special";
  let ms={
    time,day,sid:slot?.id||null,
    grade:slot?.grade||"",cat:slot?.cat||store.cats[0].key,
    nt:(!isSpecial&&slot)?(slot.names||[]).join("\n"):"",
    nt1:(isSpecial&&slot)?(slot.names||[]).filter(n=>((slot.perStudent&&slot.perStudent[n]&&slot.perStudent[n].round)||"1")==="1").join("\n"):"",
    nt2:(isSpecial&&slot)?(slot.names||[]).filter(n=>(slot.perStudent&&slot.perStudent[n]&&slot.perStudent[n].round)==="2").join("\n"):"",
    span:String(slot?.span||2),stInfos:[]
  };
  const buildOne=(n,cat,round)=>{
    const meta=store.meta[n]||{};const free=!!meta.free;
    const ps=(slot?.perStudent&&slot.perStudent[n])||{};
    const indCat=ps.cat||cat;
    const fee=free?0:(ps.fee!==undefined?ps.fee:(meta.fee!==undefined?meta.fee:(store.bf[indCat]||0)));
    return{name:n,free,fee,cat:indCat,round:round||ps.round||"1"};
  };
  // 특강: 1회차/2회차 명단을 합쳐서 stInfos 구성 (박스 위치가 회차를 결정, 기존 개별설정은 유지)
  const combineSpecialNames=()=>{
    const list1=ms.nt1.split("\n").map(n=>n.trim()).filter(Boolean);
    const list2=ms.nt2.split("\n").map(n=>n.trim()).filter(Boolean);
    const seen=new Set();const out=[];
    list1.forEach(n=>{if(!seen.has(n)){seen.add(n);out.push({name:n,round:"1"});}});
    list2.forEach(n=>{if(!seen.has(n)){seen.add(n);out.push({name:n,round:"2"});}});
    return out;
  };
  const syncSpecialSI=(cat,cur)=>combineSpecialNames().map(({name:n,round})=>{
    const found=cur.find(i=>i.name===n);
    if(found)return{...found,round};
    return buildOne(n,cat,round);
  });
  const syncSI=(nt,cat,cur)=>nt.split("\n").map(n=>n.trim()).filter(Boolean).map(n=>cur.find(i=>i.name===n)||buildOne(n,cat));
  if(slot){
    ms.stInfos=isSpecial?syncSpecialSI(slot.cat,[]):slot.names.map(n=>buildOne(n,slot.cat));
  }

  const ov=mkOv(close);const modal=mkModal(440);
  function close(){ov.remove();}
      function confirm(){
    const names=isSpecial?ms.stInfos.map(si=>si.name):ms.nt.split("\n").map(n=>n.trim()).filter(Boolean);
    const sp=Math.max(1,parseInt(ms.span)||2);
    if(!names.length){store.setSch(store.sch.filter(s=>!(s.time===time&&s.day===day)));close();render();return;}
    // perStudent: 슬롯 기본 분류와 다른 경우만 저장
    const perStudent={};
    ms.stInfos.forEach(si=>{
      const entry={};
      if(si.cat!==ms.cat)entry.cat=si.cat;
      if(!si.free)entry.fee=si.fee;
      if(isSpecial)entry.round=si.round||"1";
      if(Object.keys(entry).length)perStudent[si.name]=entry;
    });
    if(ms.sid)store.setSch(store.sch.map(s=>s.id===ms.sid?{...s,names,grade:ms.grade,cat:ms.cat,span:sp,perStudent}:s));
    else store.setSch([...store.sch,{id:isSpecial?nid2():nid(),time,day,names,grade:ms.grade,cat:ms.cat,span:sp,perStudent}]);
    if(src==="main")snapshotRevenue();
    close();render();
  }
  function rebuild(){
    modal.innerHTML="";
    modal.appendChild(mkTitle("✏️",(isSpecial?"[특강] ":"")+time.replace(/[AP]M /,"")+" ("+day+"요일)"));
    modal.appendChild(fLbl("분류"));
    const cg=D({className:"cat-grid",style:{marginBottom:"14px"}});
    store.cats.forEach(c=>{const cc=store.cc[c.key],sel=ms.cat===c.key;
      cg.appendChild(Bt({className:"cat-btn",style:{borderColor:sel?cc.t:BORDER,background:sel?cc.bg:"#faf8f4",color:sel?cc.t:TS,fontWeight:sel?"800":"400"},
        onClick:()=>{
          ms.cat=c.key;
          ms.stInfos=(isSpecial?syncSpecialSI(c.key,ms.stInfos):syncSI(ms.nt,c.key,ms.stInfos)).map(si=>({...si,fee:si.free?0:(store.bf[c.key]||0)}));
          rebuild();
        }},[c.label]));
    });
    modal.appendChild(cg);
    const r2=D({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"14px"}});
    const gd=D({},[fLbl("학년/반")]);
    const gi=Inp({className:"field-input",value:ms.grade,placeholder:isSpecial?"예) 3·4학년":"예) 초5, 중3"});
    gi.addEventListener("input",e=>ms.grade=e.target.value);gd.appendChild(gi);r2.appendChild(gd);
    const sd=D({},[fLbl("수업 길이")]);
    const sr=D({className:"span-row"});
    [{v:"1",l:"30분"},{v:"2",l:"1시간"},{v:"3",l:"1.5h"},{v:"4",l:"2시간"}].forEach(o=>{
      const sel=ms.span===o.v;
      sr.appendChild(Bt({className:"span-btn",style:{borderColor:sel?GOLD:BORDER,background:sel?"#f5edd8":"#f5f3ee",color:sel?GOLD:TS,fontWeight:sel?"800":"400"},
        onClick:()=>{ms.span=o.v;rebuild();}},[o.l]));
    });
    sd.appendChild(sr);r2.appendChild(sd);modal.appendChild(r2);
    if(isSpecial){
      const rg=D({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"4px"}});
      const box1=D({});
      box1.appendChild(fLbl("👤 1회차 학생 (1·2주)"));
      const ta1=Ta({className:"field-input",rows:"3",placeholder:"김철수\n이영희",style:{marginBottom:"4px"}},[ms.nt1]);
      ta1.addEventListener("input",e=>{ms.nt1=e.target.value;ms.stInfos=syncSpecialSI(ms.cat,ms.stInfos);rebuildFee();});
      ta1.addEventListener("keydown",e=>{if(e.key==="Enter"&&e.ctrlKey)confirm();if(e.key==="Escape")close();});
      box1.appendChild(ta1);rg.appendChild(box1);
      const box2=D({});
      box2.appendChild(fLbl("👤 2회차 학생 (3·4주)"));
      const ta2=Ta({className:"field-input",rows:"3",placeholder:"박민수\n최지우",style:{marginBottom:"4px"}},[ms.nt2]);
      ta2.addEventListener("input",e=>{ms.nt2=e.target.value;ms.stInfos=syncSpecialSI(ms.cat,ms.stInfos);rebuildFee();});
      ta2.addEventListener("keydown",e=>{if(e.key==="Enter"&&e.ctrlKey)confirm();if(e.key==="Escape")close();});
      box2.appendChild(ta2);rg.appendChild(box2);
      modal.appendChild(rg);
      modal.appendChild(D({style:{fontSize:"10px",color:"#ccc",marginBottom:"12px"}},["각 박스에 넣은 학생은 해당 회차로 자동 지정됩니다 · Ctrl+Enter 저장"]));
    } else {
      modal.appendChild(fLbl("학생 이름 (한 줄에 한 명)"));
      const ta=Ta({className:"field-input",rows:"3",placeholder:"김철수\n이영희",style:{marginBottom:"4px"}},[ms.nt]);
      ta.addEventListener("input",e=>{ms.nt=e.target.value;ms.stInfos=syncSI(ms.nt,ms.cat,ms.stInfos);rebuildFee();});
      ta.addEventListener("keydown",e=>{if(e.key==="Enter"&&e.ctrlKey)confirm();if(e.key==="Escape")close();});
      modal.appendChild(ta);
      modal.appendChild(D({style:{fontSize:"10px",color:"#ccc",marginBottom:"12px"}},["Ctrl+Enter 저장"]));
    }
    const fc=D({});modal.appendChild(fc);
    function rebuildFee(){
      fc.innerHTML="";
      if(!ms.stInfos.length)return;
      fc.appendChild(D({style:{fontSize:"11px",color:TS,fontWeight:"600",marginBottom:"7px"}},["📊 교습비 (회당)"]));
      ms.stInfos.forEach((si,i)=>{
        const siCat=si.cat||ms.cat;
        const cc2=store.cc[siCat];
        const card=D({className:"fee-calc-card",style:{background:cc2.li,borderColor:cc2.bd}});
        const tr=D({style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"6px"}});
        const ne=Sp({style:{fontWeight:"700",fontSize:"13px",color:cc2.t,cursor:"pointer",textDecoration:"underline dotted"}},[si.name]);
        ne.addEventListener("click",e=>{e.stopPropagation();openStudentModal(si.name,siCat,ms.grade,src);});
        tr.appendChild(ne);
        if(isSpecial)tr.appendChild(Sp({style:{fontSize:"10px",color:"#fff",background:ROUND_COLOR[si.round||"1"].t,borderRadius:"4px",padding:"1px 6px",fontWeight:"800",marginLeft:"4px"}},[ROUND_MAP[si.round||"1"].short]));
        if(si.free)tr.appendChild(Sp({style:{fontSize:"11px",color:"#e05a5a",fontWeight:"800",background:"#fff0f0",borderRadius:"5px",padding:"2px 7px"}},["무료"]));
        else tr.appendChild(Sp({className:"fee-lbl",style:{fontSize:"13px",fontWeight:"800",color:GOLD}},[si.fee.toLocaleString()+feeUnitText(src,siCat)]));
        card.appendChild(tr);
        // 개별 분류 선택
        const catRow=D({style:{display:"flex",gap:"3px",flexWrap:"wrap",marginBottom:"6px"}});
        store.cats.forEach(c=>{

          catRow.appendChild(Bt({style:{padding:"2px 7px",borderRadius:"6px",border:`1px solid ${sel?cc3.t:BORDER}`,background:sel?cc3.bg:"#faf8f4",color:sel?cc3.t:TS,fontWeight:sel?"800":"400",fontSize:"10px",cursor:"pointer"},
            onClick:()=>{
              ms.stInfos[i]={...ms.stInfos[i],cat:c.key,fee:si.free?0:(store.meta[si.name]?.fee!==undefined?store.meta[si.name].fee:(store.bf[c.key]||0))};

        card.appendChild(catRow);

          const cr=D({style:{display:"flex",alignItems:"center",gap:"8px"}});

    br.appendChild(Bt({className:"btn btn-primary",onClick:confirm},["✅ 확인"]));
    modal.appendChild(br);
  }
  rebuild();ov.appendChild(modal);document.body.appendChild(ov);

// ── 초/중/고 레벨별 상세 모달 ────────────────────────────
function openLevelModal(level){
  const uniqueCount=calcStudents().filter(s=>getStudentLevel(s)===level).length;
  // 슬롯 단위로 집계: 같은 학생이라도 분류(요일별 트랙)가 다르면 각각 별도 항목으로 보여준다.
  const perSlotRows=calcStudentsPerSlot();
  const agg={};
  perSlotRows.forEach(r=>{
    const key=r.name+"|"+r.cat;
    if(!agg[key])agg[key]={name:r.name,cat:r.cat,grade:r.grade,free:r.free,wc:0};
    agg[key].wc++;
  });
  const stList=Object.values(agg).filter(s=>getStudentLevel(s)===level);
  const ov=mkOv(()=>ov.remove());const modal=mkModal(480);
  modal.appendChild(mkTitle("👥",level+" 학생 현황 ("+uniqueCount+"명)"));
  if(!stList.length){
    modal.appendChild(D({style:{color:"#ccc",padding:"20px 0",textAlign:"center"}},["등록된 학생이 없습니다."]));
  } else {
    const gradeMap={};
    stList.forEach(s=>{const g=s.grade||"학년미상";if(!gradeMap[g])gradeMap[g]=[];gradeMap[g].push(s);});
    const grades=Object.keys(gradeMap).sort((a,b)=>{
      const na=parseInt(a.replace(/\D/g,""))||99,nb=parseInt(b.replace(/\D/g,""))||99;
      return na-nb;
    });
    grades.forEach(gr=>{
      const gStudents=gradeMap[gr];
      const gradeUniqueNames=new Set(gStudents.map(s=>s.name));
      const gradeSec=D({style:{marginBottom:"16px"}});
      gradeSec.appendChild(D({style:{fontWeight:"900",fontSize:"14px",color:TM,marginBottom:"8px",paddingBottom:"4px",borderBottom:`2px solid ${BORDER}`}},[gr+" ("+gradeUniqueNames.size+"명)"]));
      const catMap={};
      gStudents.forEach(s=>{if(!catMap[s.cat])catMap[s.cat]=[];catMap[s.cat].push(s);});
      CATS.filter(c=>catMap[c.key]).forEach(c=>{

  const hdrLevelCounts=LEVELS.map(lv=>({lv,cnt:hdrStList.filter(s=>getStudentLevel(s)===lv).length}));
  const hdrSpecialCount=calcStudents("special").length;
  const TAB_TITLE={tt:"플라톤 이지 국어 시간표",att:"플라톤 이지 국어 출석표",chart:"플라톤 이지 국어 통계"};

  const hdr=h("header",{});
  const leftGroup=D({style:{display:"flex",alignItems:"flex-end",gap:"28px",flexWrap:"wrap"}});
  const logoWrap=D({className:"logo-wrap"});
  logoWrap.appendChild(Sp({style:{color:"#e0a020",fontWeight:"900",fontSize:"11px",letterSpacing:"2px"}},[String(new Date().getFullYear())]));
  logoWrap.appendChild(Sp({className:"logo"},[TAB_TITLE[S.tab]||"플라톤 이지 국어"]));
  leftGroup.appendChild(logoWrap);
  const pillsWrap=D({className:"hdr-pill-group no-print",style:{marginBottom:"2px"}});
  const LEVEL_CLASS={초등:"blue",중등:"green",고등:"amber"};
  hdrLevelCounts.forEach(({lv,cnt})=>{
    pillsWrap.appendChild(D({className:"hdr-pill "+LEVEL_CLASS[lv],onClick:()=>openLevelModal(lv)},[Sp({},[lv]),Sp({className:"pv"},[cnt+"명"])]));
  });
  pillsWrap.appendChild(D({className:"hdr-pill special",onClick:()=>openSpecialLevelModal()},[Sp({},["🏖 특강"]),Sp({className:"pv"},[hdrSpecialCount+"명"])]));
  leftGroup.appendChild(pillsWrap);
  hdr.appendChild(leftGroup);
  const hdrRight=D({className:"hdr-right",style:{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}});
  const badge=Sp({className:"save-badge",id:"syncBadge"},[S.saveStatus||""]);
  applyBadgeStyle(badge,S.saveStatus);
  hdrRight.appendChild(badge);
  hdrRight.appendChild(Bt({className:"btn no-print",style:{background:"#03C75A",color:"#fff"},onClick:()=>window.open("https://m.blog.naver.com/easy-ssaem?tab=1","_blank")},["📝 블로그"]));
  hdrRight.appendChild(Bt({className:"btn btn-ghost no-print",onClick:openExportModal},["📤 내보내기"]));
  hdrRight.appendChild(Bt({className:"btn btn-ghost no-print",onClick:()=>{
    const doPrint=()=>requestAnimationFrame(()=>requestAnimationFrame(()=>window.print()));
    if(S.tab!=="tt"){S.tab="tt";render();doPrint();}else doPrint();
  }},["🖨️ 인쇄"]));
  hdrRight.appendChild(Bt({className:"btn btn-ghost no-print",onClick:openFeeModal},["⚙️ 기본 교습비"]));
  hdr.appendChild(hdrRight);root.appendChild(hdr);

  const mainEl=h("main",{});
  const topRow=D({style:{display:"flex",justifyContent:"flex-start",alignItems:"center",flexWrap:"wrap",gap:"10px"}});
  const tabNav=D({className:"tab-nav no-print"});
  [["tt","📅 시간표"],["att","📋 출결"],["chart","📈 통계"]].forEach(([key,label])=>{
    tabNav.appendChild(Bt({className:"tab-btn"+(S.tab===key?" active":""),onClick:()=>{S.tab=key;render();}},[label]));
  });
  topRow.appendChild(tabNav);
  topRow.appendChild(renderSearchBar());
  mainEl.appendChild(topRow);

  if(S.tab==="tt")mainEl.appendChild(renderTT());
  else if(S.tab==="att")mainEl.appendChild(renderAtt());
  else mainEl.appendChild(renderChart());

  root.appendChild(mainEl);
  scheduleAutoSave();
}

// ── 초기화 ───────────────────────────────────────────────
initLoad();
</script>
</body>
</html>
