<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이지플라톤 시간표 v5</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-app-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f0ebe0;color:#2c2c2c;font-size:13px;}
button{cursor:pointer;font-family:inherit;transition:all .15s;}
input,textarea,select{font-family:inherit;}
textarea{resize:vertical;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#ede8df;}
::-webkit-scrollbar-thumb{background:#c8bfb0;border-radius:4px;}
#app{min-height:100vh;}
header{background:linear-gradient(135deg,#fff 60%,#fdf8ef);border-bottom:2px solid #b8872a;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;box-shadow:0 3px 16px rgba(180,140,50,.1);}
.logo{color:#b8872a;font-weight:900;font-size:22px;letter-spacing:-1px;}
.logo-sub{color:#aaa;font-size:12px;margin-left:10px;}
.ver-badge{font-size:10px;color:#b8872a;background:#fdf3de;border:1px solid #e8cc88;border-radius:4px;padding:1px 7px;font-weight:700;margin-left:6px;}
main{padding:20px 28px;display:flex;flex-direction:column;gap:18px;}
.tab-nav{display:flex;gap:4px;background:#fff;border-radius:12px;padding:5px;border:1px solid #ddd5c8;box-shadow:0 2px 8px rgba(180,140,50,.06);width:fit-content;}
.tab-btn{padding:8px 20px;border-radius:9px;font-weight:700;font-size:13px;border:none;background:transparent;color:#aaa;cursor:pointer;}
.tab-btn.active{background:#b8872a;color:#fff;box-shadow:0 2px 8px rgba(184,135,42,.3);}
.tab-btn:not(.active):hover{background:#fdf3de;color:#b8872a;}
.card{background:#fff;border:1px solid #ddd5c8;border-radius:14px;overflow:hidden;box-shadow:0 2px 16px rgba(180,140,50,.07);}
.card-head{padding:13px 20px;border-bottom:1px solid #f0ebe0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:linear-gradient(90deg,#fdfaf5,#fff);}
.card-title{font-weight:800;color:#b8872a;font-size:14px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:9px;font-weight:700;font-size:12px;border:none;outline:none;cursor:pointer;transition:all .15s;}
.btn-primary{background:#b8872a;color:#fff;box-shadow:0 2px 8px rgba(184,135,42,.22);}
.btn-primary:hover{background:#a07020;}
.btn-ghost{background:#fdf9f3;color:#b8872a;border:1px solid #e5d9c0;}
.btn-ghost:hover{background:#f8edd8;}
.btn-green{background:#edfaf3;color:#2a8a50;border:1px solid #a0d8b8;}
.btn-green:hover{background:#d8f5e8;}
.tt-wrap{overflow-x:auto;}
table.tt{border-collapse:collapse;min-width:700px;width:100%;}
table.tt th,table.tt td{border:1px solid #e8e0d4;}
table.tt thead th{background:#f8f4ed;font-weight:800;font-size:13px;letter-spacing:2px;padding:10px;text-align:center;color:#666;}
table.tt .time-col{background:#faf7f2;text-align:right;padding:0 8px;font-size:10px;font-weight:700;color:#aaa;white-space:nowrap;vertical-align:middle;width:46px;}
table.tt .ap-col{text-align:center;font-weight:900;font-size:10px;writing-mode:vertical-rl;letter-spacing:4px;padding:3px 2px;width:18px;}
table.tt .empty-cell{background:#fdfcf9;cursor:pointer;min-width:100px;}
table.tt .empty-cell:hover{background:#fdf5e0;}
table.tt .slot-cell{cursor:default;min-width:100px;padding:7px 9px;vertical-align:top;}
.slot-grade{font-size:9px;font-weight:800;margin-bottom:3px;line-height:1.4;cursor:pointer;opacity:.8;}
.slot-name{display:inline-block;font-size:12px;font-weight:600;line-height:2;cursor:pointer;padding:0 4px;border-radius:4px;}
.leg-badge{border-radius:5px;padding:2px 9px;font-size:11px;font-weight:700;}
table.stat{width:100%;border-collapse:collapse;font-size:12px;}
table.stat th,table.stat td{border:1px solid #e8e0d4;padding:10px 14px;}
table.stat thead th{background:#f8f4ed;color:#999;font-weight:700;}
table.stat tbody tr:hover{background:#fdfaf4;}
table.stat tfoot td{background:#f8f4ed;font-weight:800;}
.fee-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.fee-group{display:flex;flex-direction:column;gap:14px;}
.fee-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05);}
.fee-card-head{padding:11px 15px;display:flex;justify-content:space-between;align-items:center;}
.fee-card-body{padding:11px 15px;display:flex;flex-direction:column;gap:9px;}
.st-chip{border-radius:8px;padding:5px 10px;font-size:12px;display:inline-flex;align-items:center;gap:4px;cursor:pointer;transition:filter .12s;}
.st-chip:hover{filter:brightness(.93);}
table.att-tbl{width:100%;border-collapse:collapse;font-size:12px;}
table.att-tbl th,table.att-tbl td{border:1px solid #e8e0d4;padding:6px 3px;text-align:center;}
table.att-tbl thead th{background:#f8f4ed;font-weight:700;color:#888;}
table.att-tbl tbody tr:hover{background:#fdfaf4;}
.overlay{position:fixed;inset:0;background:rgba(44,32,16,.38);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.modal{background:#fff;border-radius:18px;padding:28px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 56px rgba(80,50,10,.18);border:1px solid #e8e0d4;}
.modal-title{font-weight:800;font-size:15px;margin-bottom:16px;color:#b8872a;display:flex;align-items:center;gap:7px;}
.field-label{font-size:11px;color:#999;font-weight:700;margin-bottom:5px;letter-spacing:.5px;display:block;}
.field-input{width:100%;border:1px solid #ddd5c8;border-radius:9px;padding:8px 12px;font-size:13px;outline:none;background:#faf9f6;color:#2c2c2c;transition:border-color .1s;}
.field-input:focus{border-color:#b8872a;background:#fff;}
.cat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.cat-btn{padding:7px 6px;border-radius:8px;font-size:11px;text-align:center;cursor:pointer;border-width:1.5px;border-style:solid;}
.span-row{display:flex;gap:4px;}
.span-btn{flex:1;padding:8px 0;border-radius:8px;font-size:10px;cursor:pointer;border-width:1.5px;border-style:solid;}
.fee-calc-card{border-radius:10px;padding:10px 13px;margin-bottom:6px;border-width:1.5px;border-style:solid;}
.modal-row{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.month-nav{display:flex;align-items:center;gap:10px;}
.month-lbl{font-weight:800;font-size:14px;color:#555;min-width:70px;text-align:center;}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px;}
.chart-box{position:relative;height:260px;}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px 20px;border-top:1px solid #f0ebe0;}
.summary-item{text-align:center;background:#faf9f6;border-radius:10px;padding:14px 0;}
.summary-val{font-size:20px;font-weight:900;color:#b8872a;}
.summary-sub{font-size:11px;color:#aaa;margin-top:3px;}
.save-badge{font-size:11px;border-radius:6px;padding:3px 9px;}
@media print{
  header .hdr-right,.tab-nav,.no-print{display:none!important;}
  .card{box-shadow:none!important;border:1px solid #ccc!important;}
  body{background:#fff!important;}
  .fee-grid{grid-template-columns:repeat(2,1fr)!important;}
  main{padding:10px!important;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── 상수 ─────────────────────────────────────────────────
const CATS=[
  {key:"초등_플라톤",label:"초등 플라톤",sub:"플라톤"},
  {key:"초등_이지",  label:"초등 이지",  sub:"이지"},
  {key:"중등_이지",  label:"중등 이지",  sub:"이지"},
  {key:"중등_이지수능",label:"중등 이지수능",sub:"이지수능"},
  {key:"고등_이지수능",label:"고등 이지수능",sub:"이지수능"},
  {key:"고등_개인",  label:"고등 개인",  sub:"개인"},
];
const BFD_INIT={초등_플라톤:75000,초등_이지:75000,중등_이지:140000,중등_이지수능:160000,고등_이지수능:160000,고등_개인:350000};
const CC={
  초등_플라톤:{t:"#3a6ea8",bg:"#dce8f8",bd:"#9cc0ec",li:"#edf4fc"},
  초등_이지:  {t:"#5a95cc",bg:"#e4f1ff",bd:"#a8d0f0",li:"#f0f8ff"},
  중등_이지:  {t:"#3a9a5c",bg:"#dcf2e8",bd:"#90d4ac",li:"#ebfaf3"},
  중등_이지수능:{t:"#2a7a4a",bg:"#cceadc",bd:"#80c8a0",li:"#e5f7ee"},
  고등_이지수능:{t:"#c06020",bg:"#fce4d0",bd:"#f0a870",li:"#fff0e4"},
  고등_개인:  {t:"#9a48a8",bg:"#f2e4f8",bd:"#d490d8",li:"#faeeff"},
};
const GOLD="#b8872a",BORDER="#ddd5c8",TS="#888",TM="#2c2c2c";
const DAYS=["월","화","수","목","금","토","일"];
const GROUPS=[{cats:["초등_플라톤","초등_이지"]},{cats:["중등_이지"]},{cats:["중등_이지수능","고등_이지수능"]},{cats:["고등_개인"]}];
const SK="ezp_v5_data";

// ── Firebase 설정 ────────────────────────────────────────
// Firebase 콘솔 > 프로젝트 설정 > 일반 > "내 앱" > SDK 설정 및 구성에서
// 아래 값을 복사해 붙여넣으세요.
const firebaseConfig={
  apiKey:"AIzaSyDqeOVHlikt7Ob0X1LWCtnPOjHeT2OduPA",
  authDomain:"ezplaton-schedule.firebaseapp.com",
  projectId:"ezplaton-schedule",
  storageBucket:"ezplaton-schedule.firebasestorage.app",
  messagingSenderId:"834145792391",
  appId:"1:834145792391:web:6330ca2e15ccf9377b2322"
};
let db=null;
try{
  firebase.initializeApp(firebaseConfig);
  db=firebase.firestore();
}catch(e){console.error("Firebase 초기화 실패",e);}
const FB_COL="ezplaton",FB_DOC="schedule";

// ── 슬롯 ─────────────────────────────────────────────────
function buildSlots(){
  const s=[];
  for(let hh=10;hh<12;hh++){s.push({key:`AM ${hh}:00`,hr:true,ap:"AM"});s.push({key:`AM ${hh}:30`,hr:false,ap:"AM"});}
  for(let hh=12;hh<24;hh++){s.push({key:`PM ${hh}:00`,hr:true,ap:"PM"});s.push({key:`PM ${hh}:30`,hr:false,ap:"PM"});}
  return s;
}
const SL=buildSlots(),AK=SL.map(s=>s.key);
const TG=[{lbl:"AM",keys:SL.filter(s=>s.ap==="AM").map(s=>s.key)},{lbl:"PM",keys:SL.filter(s=>s.ap==="PM").map(s=>s.key)}];

// ── 초기 데이터 ──────────────────────────────────────────
const I_SCH=[
  {id:"s1", time:"PM 14:00",day:"금",names:["김훈민","김정음"],grade:"초1",cat:"초등_플라톤",span:2},
  {id:"s2", time:"PM 15:00",day:"월",names:["김다은"],          grade:"초3",cat:"초등_플라톤",span:2},
  {id:"s3", time:"PM 15:00",day:"화",names:["장아란","김가온"], grade:"초5(이지)",cat:"초등_플라톤",span:2},
  {id:"s4", time:"PM 15:00",day:"목",names:["장아란","김가온","황지우"],grade:"초5(풀)",cat:"초등_플라톤",span:2},
  {id:"s5", time:"PM 15:00",day:"금",names:["황지우"],          grade:"초5",cat:"초등_플라톤",span:2},
  {id:"s6", time:"PM 16:00",day:"월",names:["박준연"],          grade:"초2",cat:"초등_플라톤",span:2},
  {id:"s7", time:"PM 17:00",day:"목",names:["장재원","임태왕"], grade:"초3",cat:"초등_플라톤",span:2},
  {id:"s8", time:"PM 18:00",day:"목",names:["임하주"],          grade:"초2",cat:"초등_플라톤",span:2},
  {id:"s9", time:"PM 20:00",day:"수",names:["이진우(명지중3)"],grade:"중3",cat:"중등_이지",span:4},
  {id:"s10",time:"PM 20:00",day:"화",names:["김두현"],          grade:"고등",cat:"고등_이지수능",span:4},
  {id:"s11",time:"PM 20:00",day:"금",names:["오승혜"],          grade:"고등",cat:"고등_이지수능",span:4},
  {id:"s12",time:"PM 21:00",day:"수",names:["김민재"],          grade:"고등",cat:"고등_이지수능",span:4},
  {id:"s13",time:"PM 21:00",day:"목",names:["김두현"],          grade:"고등",cat:"고등_이지수능",span:4},
  {id:"s14",time:"PM 21:00",day:"일",names:["김민재"],          grade:"고등",cat:"고등_이지수능",span:4},
];
const I_META={장재원:{free:true},장아란:{free:true},김가온:{free:true}};

// ── 상태 ─────────────────────────────────────────────────
let S={
  sch:JSON.parse(JSON.stringify(I_SCH)),
  bf:{...BFD_INIT},
  meta:JSON.parse(JSON.stringify(I_META)),
  att:{},
  memo:{},
  tab:"tt",
  attMonth:toYM(new Date()),
  saveStatus:"",
  loaded:false,
};
let idC=200; const nid=()=>`s${++idC}`;
let chartInst=[];

function toYM(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function ymLabel(ym){const[y,m]=ym.split("-");return y+"년 "+Number(m)+"월";}
function ymAdd(ym,n){const[y,m]=ym.split("-").map(Number);return toYM(new Date(y,m-1+n,1));}
function daysInMonth(ym){const[y,m]=ym.split("-").map(Number);return new Date(y,m,0).getDate();}

// ── 저장/불러오기 ─────────────────────────────────────────
function localLoad(){
  try{
    const v=localStorage.getItem(SK);
    if(v){const d=JSON.parse(v);applyData(d);S.saveStatus="✅ 불러오기 완료";}
  }catch(e){}
  S.loaded=true; render();
}
function localSave(){
  try{
    localStorage.setItem(SK,JSON.stringify(packData()));
    S.saveStatus="✅ "+new Date().toLocaleTimeString()+" ("+S.sch.length+"슬롯)";
  }catch(e){S.saveStatus="❌ 저장 실패";}
  render();
}
async function sharedLoad(){
  if(!db){S.saveStatus="❌ Firebase 미설정";S.loaded=true;render();return;}
  try{
    const doc=await db.collection(FB_COL).doc(FB_DOC).get();
    if(doc.exists){applyData(doc.data());S.saveStatus="🌐 공유 불러옴 "+new Date().toLocaleTimeString();}
    else S.saveStatus="🌐 공유 데이터 없음 (처음 사용 시 정상)";
  }catch(e){console.error(e);S.saveStatus="❌ 공유 불러오기 실패";}
  S.loaded=true; render();
}
async function sharedSave(){
  if(!db){S.saveStatus="❌ Firebase 미설정";render();return;}
  try{
    await db.collection(FB_COL).doc(FB_DOC).set(JSON.parse(JSON.stringify(packData())));
    S.saveStatus="🌐 공유 저장 완료 "+new Date().toLocaleTimeString();
  }catch(e){console.error(e);S.saveStatus="❌ 공유 저장 실패";}
  render();
}
function packData(){return{sch:S.sch,bf:S.bf,meta:S.meta,att:S.att,memo:S.memo};}
function applyData(d){
  if(d.sch&&d.sch.length)S.sch=d.sch;
  if(d.bf)S.bf={...BFD_INIT,...d.bf};
  if(d.meta)S.meta={...I_META,...d.meta};
  if(d.att)S.att=d.att;
  if(d.memo)S.memo=d.memo;
}
// 처음엔 로컬 로드, Firebase 설정돼 있으면 공유 데이터도 자동 불러옴
function initLoad(){
  localLoad();
  if(db)sharedLoad();
}

// ── 파생 계산 ─────────────────────────────────────────────
function calcStudents(){
  const m={};
  S.sch.forEach(slot=>{
    (slot.names||[]).forEach(n=>{
      if(!m[n])m[n]={name:n,slotCat:slot.cat,slotGrade:slot.grade,wc:0};
      m[n].wc++;
    });
  });
  return Object.values(m).map(s=>{
    const meta=S.meta[s.name]||{};
    const cat=meta.cat||s.slotCat;
    const grade=meta.grade||s.slotGrade;
    const free=!!meta.free;
    const fee=free?0:(meta.fee!==undefined?Number(meta.fee):(S.bf[cat]||0));
    return{name:s.name,cat,grade,free,wc:s.wc,fee,monthly:free?0:fee*s.wc,memo:meta.memo||"",regDate:meta.regDate||""};
  });
}
function buildCellMaps(){
  const cmap={},smap={};
  S.sch.forEach(s=>{
    if(!(s.names&&s.names.length))return;
    const k=`${s.time}_${s.day}`;
    if(!cmap[k])cmap[k]=s;
    if(s.span>1){const ti=AK.indexOf(s.time);for(let i=1;i<s.span;i++)if(AK[ti+i])smap[`${AK[ti+i]}_${s.day}`]=true;}
  });
  return{cmap,smap};
}
function calcMonthlyRevenue(){
  const now=new Date();
  const months=Array.from({length:6},(_,i)=>toYM(new Date(now.getFullYear(),now.getMonth()-5+i,1)));
  return months.map(ym=>{
    let total=0;
    calcStudents().forEach(st=>{
      if(st.free)return;
      const rec=S.att[st.name]||{};
      const days=daysInMonth(ym);
      let cnt=0,hasData=false;
      for(let d=1;d<=days;d++){
        const dk=ym+"-"+String(d).padStart(2,"0");
        if(rec[dk]!==undefined)hasData=true;
        if(rec[dk]==="O"||rec[dk]==="D")cnt++;
      }
      total+=hasData?st.fee*cnt:st.monthly;
    });
    return{ym,label:Number(ym.split("-")[1])+"월",total};
  });
}

// ── DOM 헬퍼 ─────────────────────────────────────────────
const h=(tag,attrs,children=[])=>{
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function")el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v);
  });
  children.forEach(c=>{
    if(c==null)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return el;
};
const D=(a,c=[])=>h("div",a,c);
const Sp=(a,c=[])=>h("span",a,c);
const Bt=(a,c=[])=>h("button",a,c);
const Inp=(a)=>h("input",a);
const Ta=(a,c=[])=>h("textarea",a,c);
const mkOv=(cb)=>{const o=D({className:"overlay"});o.addEventListener("click",cb);return o;};
const mkModal=(w=400)=>{const m=D({className:"modal",style:{width:w+"px"}});m.addEventListener("click",e=>e.stopPropagation());return m;};
const mkTitle=(icon,txt)=>D({className:"modal-title"},[Sp({},[icon+" "]),document.createTextNode(txt)]);
const fLbl=(t)=>h("label",{className:"field-label"},[t]);

// ── 인라인 삭제 확인 UI ───────────────────────────────────
function mkDelConfirm(onYes,onNo){
  const wrap=D({style:{display:"inline-flex",alignItems:"center",gap:"4px"}});
  wrap.appendChild(Sp({style:{fontSize:"11px",color:"#d04040"}},["삭제?"]));
  wrap.appendChild(Bt({style:{background:"#d04040",color:"#fff",border:"none",borderRadius:"4px",fontSize:"10px",padding:"2px 7px",cursor:"pointer"},onClick:(e)=>{e.stopPropagation();onYes();}},["예"]));
  wrap.appendChild(Bt({style:{background:"#eee",color:"#666",border:"none",borderRadius:"4px",fontSize:"10px",padding:"2px 7px",cursor:"pointer"},onClick:(e)=>{e.stopPropagation();onNo();}},["아니오"]));
  return wrap;
}

// ── 셀 모달 ──────────────────────────────────────────────
function openCellModal(time,day){
  const{cmap}=buildCellMaps();
  const slot=cmap[`${time}_${day}`];
  let ms={
    time,day,sid:slot?.id||null,
    grade:slot?.grade||"",cat:slot?.cat||"초등_플라톤",
    nt:slot?(slot.names||[]).join("\n"):"",
    span:String(slot?.span||2),stInfos:[]
  };
  const buildSI=(names,cat)=>names.map(n=>{
    const meta=S.meta[n]||{};const free=!!meta.free;
    const fee=free?0:(meta.fee!==undefined?meta.fee:(S.bf[cat]||0));
    return{name:n,free,fee};
  });
  const syncSI=(nt,cat,cur)=>nt.split("\n").map(n=>n.trim()).filter(Boolean).map(n=>cur.find(i=>i.name===n)||buildSI([n],cat)[0]);
  if(slot)ms.stInfos=buildSI(slot.names,slot.cat);

  const ov=mkOv(close);const modal=mkModal(440);
  function close(){ov.remove();}
  function confirm(){
    const names=ms.nt.split("\n").map(n=>n.trim()).filter(Boolean);
    const sp=Math.max(1,parseInt(ms.span)||2);
    if(!names.length){S.sch=S.sch.filter(s=>!(s.time===time&&s.day===day));close();render();return;}
    ms.stInfos.forEach(si=>{S.meta[si.name]={...(S.meta[si.name]||{}),fee:si.fee};});
    if(ms.sid)S.sch=S.sch.map(s=>s.id===ms.sid?{...s,names,grade:ms.grade,cat:ms.cat,span:sp}:s);
    else S.sch=[...S.sch,{id:nid(),time,day,names,grade:ms.grade,cat:ms.cat,span:sp}];
    close();render();
  }
  function rebuild(){
    modal.innerHTML="";
    modal.appendChild(mkTitle("✏️",time.replace(/[AP]M /,"")+" ("+day+"요일)"));
    modal.appendChild(fLbl("분류"));
    const cg=D({className:"cat-grid",style:{marginBottom:"14px"}});
    CATS.forEach(c=>{const cc=CC[c.key],sel=ms.cat===c.key;
      cg.appendChild(Bt({className:"cat-btn",style:{borderColor:sel?cc.t:BORDER,background:sel?cc.bg:"#faf8f4",color:sel?cc.t:TS,fontWeight:sel?"800":"400"},
        onClick:()=>{ms.cat=c.key;ms.stInfos=syncSI(ms.nt,c.key,ms.stInfos).map(si=>({...si,fee:si.free?0:(S.bf[c.key]||0)}));rebuild();}},[c.label]));
    });
    modal.appendChild(cg);
    const r2=D({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"14px"}});
    const gd=D({},[fLbl("학년/반")]);
    const gi=Inp({className:"field-input",value:ms.grade,placeholder:"예) 초5, 중3"});
    gi.addEventListener("input",e=>ms.grade=e.target.value);gd.appendChild(gi);r2.appendChild(gd);
    const sd=D({},[fLbl("수업 길이")]);
    const sr=D({className:"span-row"});
    [{v:"1",l:"30분"},{v:"2",l:"1시간"},{v:"3",l:"1.5h"},{v:"4",l:"2시간"}].forEach(o=>{
      const sel=ms.span===o.v;
      sr.appendChild(Bt({className:"span-btn",style:{borderColor:sel?GOLD:BORDER,background:sel?"#f5edd8":"#faf9f6",color:sel?GOLD:TS,fontWeight:sel?"800":"400"},
        onClick:()=>{ms.span=o.v;rebuild();}},[o.l]));
    });
    sd.appendChild(sr);r2.appendChild(sd);modal.appendChild(r2);
    modal.appendChild(fLbl("학생 이름 (한 줄에 한 명)"));
    const ta=Ta({className:"field-input",rows:"3",placeholder:"김철수\n이영희",style:{marginBottom:"4px"}},[ms.nt]);
    ta.addEventListener("input",e=>{ms.nt=e.target.value;ms.stInfos=syncSI(ms.nt,ms.cat,ms.stInfos);rebuildFee();});
    ta.addEventListener("keydown",e=>{if(e.key==="Enter"&&e.ctrlKey)confirm();if(e.key==="Escape")close();});
    modal.appendChild(ta);
    modal.appendChild(D({style:{fontSize:"10px",color:"#ccc",marginBottom:"12px"}},["Ctrl+Enter 저장"]));
    const fc=D({});modal.appendChild(fc);
    function rebuildFee(){
      fc.innerHTML="";
      const names=ms.nt.split("\n").map(n=>n.trim()).filter(Boolean);
      if(!names.length)return;
      ms.stInfos=syncSI(ms.nt,ms.cat,ms.stInfos);
      const cc=CC[ms.cat];
      fc.appendChild(D({style:{fontSize:"11px",color:TS,fontWeight:"600",marginBottom:"7px"}},["📊 교습비 (회당)"]));
      ms.stInfos.forEach((si,i)=>{
        const card=D({className:"fee-calc-card",style:{background:cc.li,borderColor:cc.bd}});
        const tr=D({style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:si.free?"0":"6px"}});
        const ne=Sp({style:{fontWeight:"700",fontSize:"13px",color:cc.t,cursor:"pointer",textDecoration:"underline dotted"}},[si.name]);
        ne.addEventListener("click",e=>{e.stopPropagation();openStudentModal(si.name,ms.cat,ms.grade);});
        tr.appendChild(ne);
        if(si.free)tr.appendChild(Sp({style:{fontSize:"11px",color:"#e05a5a",fontWeight:"800",background:"#fff0f0",borderRadius:"5px",padding:"2px 7px"}},["무료"]));
        else tr.appendChild(Sp({className:"fee-lbl",style:{fontSize:"13px",fontWeight:"800",color:GOLD}},[si.fee.toLocaleString()+"원/회"]));
        card.appendChild(tr);
        if(!si.free){
          const cr=D({style:{display:"flex",alignItems:"center",gap:"8px"}});
          const fi=Inp({type:"number",value:String(si.fee),style:{width:"110px",border:`1px solid ${cc.bd}`,borderRadius:"7px",padding:"5px 8px",fontSize:"13px",textAlign:"right",outline:"none",background:"#fff",fontWeight:"700"}});
          fi.addEventListener("input",e=>{
            const v=Number(e.target.value)||0;
            ms.stInfos[i]={...ms.stInfos[i],fee:v};
            const lbl=card.querySelector(".fee-lbl");
            if(lbl)lbl.textContent=v.toLocaleString()+"원/회";
          });
          cr.appendChild(fi);cr.appendChild(Sp({style:{fontSize:"11px",color:TS}},["원/회"]));card.appendChild(cr);
        }
        fc.appendChild(card);
      });
    }
    rebuildFee();
    const br=D({className:"modal-row"});
    br.appendChild(Bt({className:"btn btn-ghost",onClick:close},["취소"]));
    br.appendChild(Bt({className:"btn btn-primary",onClick:confirm},["✅ 확인"]));
    modal.appendChild(br);
  }
  rebuild();ov.appendChild(modal);document.body.appendChild(ov);
}

// ── 학생 모달 ────────────────────────────────────────────
function openStudentModal(name,fbCat,fbGrade){
  const stList=calcStudents();
  const st=stList.find(s=>s.name===name);
  let ms={
    name,cat:st?.cat||fbCat||"초등_플라톤",
    grade:st?.grade||fbGrade||"",
    free:st?.free||false,
    fv:String(st?.fee||(S.bf[st?.cat||fbCat]||0)),
    regDate:S.meta[name]?.regDate||"",
    activeTab:"info",
    infoEditTs:null,
    memoEditTs:null,
    attM:toYM(new Date()),
  };

  const ov=mkOv(close);const modal=mkModal(700);
  function close(){ov.remove();}
  function saveMeta(){
    S.meta[ms.name]={...(S.meta[ms.name]||{}),cat:ms.cat,grade:ms.grade,free:ms.free,fee:ms.free?0:Number(ms.fv),regDate:ms.regDate};
    S.sch=S.sch.map(s=>{if((s.names||[]).includes(ms.name)&&s.names.length===1)return{...s,cat:ms.cat,grade:ms.grade};return s;});
    close();render();
  }

  function build(){
    modal.innerHTML="";
    // 탭
    const tabRow=D({style:{display:"flex",gap:"6px",marginBottom:"18px"}});
    [{t:"info",l:"📋 기본정보"},{t:"memo",l:"📝 수업메모"},{t:"att",l:"📅 출결"}].forEach(({t,l})=>{
      const sel=ms.activeTab===t;
      tabRow.appendChild(Bt({style:{padding:"6px 16px",borderRadius:"8px",border:`1.5px solid ${sel?GOLD:BORDER}`,background:sel?"#f5edd8":"#faf9f6",color:sel?GOLD:TS,fontWeight:sel?"800":"400",fontSize:"12px"},
        onClick:()=>{ms.activeTab=t;build();}},[l]));

    // ── 기본정보 탭 ──
    if(ms.activeTab==="info"){
      const wrap=D({style:{display:"flex",gap:"24px"}});

      left.appendChild(mkTitle("👤",ms.name));
      left.appendChild(fLbl("분류"));
      const cg=D({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px",marginBottom:"12px"}});
      CATS.forEach(c=>{const cc=CC[c.key],sel=ms.cat===c.key;
        cg.appendChild(Bt({style:{padding:"6px 8px",borderRadius:"8px",border:`1.5px solid ${sel?cc.t:BORDER}`,background:sel?cc.bg:"#faf8f4",color:sel?cc.t:TS,fontWeight:sel?"800":"400",fontSize:"12px",cursor:"pointer"},
          onClick:()=>{ms.cat=c.key;if(!ms.free)ms.fv=String(S.bf[c.key]||0);build();}},[c.label]));
      });
      left.appendChild(cg);
      left.appendChild(fLbl("학년"));
      const gi=Inp({className:"field-input",value:ms.grade,placeholder:"예) 초3, 중2",style:{marginBottom:"12px"}});
      gi.addEventListener("input",e=>ms.grade=e.target.value);left.appendChild(gi);
      left.appendChild(fLbl("등록일"));
      const ri=Inp({type:"date",className:"field-input",value:ms.regDate,style:{marginBottom:"12px"}});
      ri.addEventListener("input",e=>ms.regDate=e.target.value);left.appendChild(ri);
      left.appendChild(fLbl("유/무료"));
      const fr=D({style:{display:"flex",gap:"7px",marginBottom:"12px"}});
      [false,true].forEach(v=>{const sel=ms.free===v;
        fr.appendChild(Bt({style:{flex:"1",padding:"7px 0",borderRadius:"9px",border:`1.5px solid ${sel?(v?"#e05a5a":GOLD):BORDER}`,background:sel?(v?"#fff0f0":"#f5edd8"):"#faf9f6",color:sel?(v?"#e05a5a":GOLD):TS,fontWeight:sel?"800":"400",fontSize:"12px"},
          onClick:()=>{ms.free=v;build();}},[v?"무료":"유료"]));
      });
      left.appendChild(fr);

        left.appendChild(fLbl("회당 교습비"));
        const frow=D({style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"}});
        const fi=Inp({type:"number",className:"field-input",value:ms.fv,style:{textAlign:"right",fontSize:"14px"}});
        fi.addEventListener("input",e=>ms.fv=e.target.value);
        frow.appendChild(fi);frow.appendChild(Sp({style:{color:TS,whiteSpace:"nowrap",fontSize:"12px"}},["원/회"]));left.appendChild(frow);
        const dr=D({style:{fontSize:"11px",color:TS,marginBottom:"12px",display:"flex",alignItems:"center",gap:"6px"}},[

        ]);
        dr.appendChild(Bt({style:{fontSize:"11px",color:GOLD,background:"none",border:"none",textDecoration:"underline",cursor:"pointer"},
          onClick:()=>{ms.fv=String(S.bf[ms.cat]||0);build();}},["적용"]));
        left.appendChild(dr);

      const lr=D({className:"modal-row"});

          } else {
            const metaRow=D({style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"4px"}});
            metaRow.appendChild(D({style:{fontSize:"10px",color:"#aaa"}},[m.date+(m.session?" · "+m.session+"회차":"")]));
            const acts=D({style:{display:"flex",gap:"3px"}});
            acts.appendChild(Bt({style:{background:"none",border:"none",color:GOLD,fontSize:"12px",cursor:"pointer",padding:"0 3px"},
              onClick:(e)=>{e.stopPropagation();ms.infoEditTs=m.ts;build();}},["✏️"]));
            const delBtn=Bt({style:{background:"none",border:"none",color:"#d04040",fontSize:"12px",cursor:"pointer",padding:"0 3px"},
              onClick:(e)=>{
                e.stopPropagation();
                const ts=m.ts;
                const conf=mkDelConfirm(
                  ()=>{S.memo[name]=(S.memo[name]||[]).filter(x=>x.ts!==ts);ms.infoEditTs=null;build();},
                  ()=>build()
                );
                delBtn.replaceWith(conf);
              }},["🗑"]);
            acts.appendChild(delBtn);
            metaRow.appendChild(acts);item.appendChild(metaRow);
            item.appendChild(D({style:{fontSize:"12px",lineHeight:"1.7",color:TM,whiteSpace:"pre-wrap"}},[m.content]));
          }
          list.appendChild(item);
        });
        right.appendChild(list);
      }
      right.appendChild(Bt({className:"btn btn-ghost",style:{marginTop:"10px",fontSize:"12px"},
        onClick:()=>{ms.activeTab="memo";build();}},["+ 수업 메모 추가"]));
      wrap.appendChild(right);modal.appendChild(wrap);

    // ── 수업메모 탭 ──
    } else if(ms.activeTab==="memo"){

      const addBox=D({style:{background:"#fdf9f3",border:`1px solid ${BORDER}`,borderRadius:"12px",padding:"14px",marginBottom:"16px"}});

    tr.appendChild(h("td",{},[Sp({style:{background:cc.bg,color:cc.t,border:`1px solid ${cc.bd}`,borderRadius:"6px",padding:"3px 10px",fontWeight:"700",fontSize:"11px"}},[cat.label])]));
    tr.appendChild(h("td",{style:{textAlign:"right",fontWeight:"700"}},[cst.length+"명"]));
    tr.appendChild(h("td",{style:{textAlign:"right",color:GOLD,fontWeight:"800"}},[tot.toLocaleString()+"원"]));
    const pTd=h("td",{style:{textAlign:"right"}});
    const pb=D({style:{display:"flex",alignItems:"center",gap:"6px",justifyContent:"flex-end"}});
    pb.appendChild(D({style:{height:"8px",width:Math.max(4,pct*1.2)+"px",maxWidth:"120px",background:cc.t,borderRadius:"4px"}}));
    pb.appendChild(Sp({style:{fontSize:"11px",color:TS,minWidth:"30px"}},[pct+"%"]));
    pTd.appendChild(pb);tr.appendChild(pTd);tb.appendChild(tr);
  });
  tbl.appendChild(tb);
  tbl.appendChild(h("tfoot",{},[h("tr",{},[h("td",{style:{color:TS}},["합계"]),h("td",{style:{textAlign:"right",fontWeight:"900"}},[stList.length+"명"]),h("td",{style:{textAlign:"right",color:GOLD,fontWeight:"900"}},[grand.toLocaleString()+"원"]),h("td",{})])]));
  tw.appendChild(tbl);chartCard.appendChild(tw);wrap.appendChild(chartCard);

  setTimeout(()=>{
    const catData=CATS.map(c=>({label:c.label,val:stList.filter(s=>s.cat===c.key).reduce((a,s)=>a+s.monthly,0),color:CC[c.key].t,bg:CC[c.key].bg})).filter(d=>d.val>0);
    chartInst.push(new Chart(pieCanvas,{type:"doughnut",data:{labels:catData.map(d=>d.label),datasets:[{data:catData.map(d=>d.val),backgroundColor:catData.map(d=>d.bg),borderColor:catData.map(d=>d.color),borderWidth:2,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{font:{size:11},padding:10}},title:{display:true,text:"분류별 교습비 비중",font:{size:13,weight:"bold"},color:"#555"}}}}));
    const monthly=calcMonthlyRevenue();
    chartInst.push(new Chart(barCanvas,{type:"bar",data:{labels:monthly.map(m=>m.label),datasets:[{label:"월 교습비",data:monthly.map(m=>m.total),backgroundColor:"rgba(184,135,42,.25)",borderColor:"rgba(184,135,42,.8)",borderWidth:2,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:"월별 교습비 추이",font:{size:13,weight:"bold"},color:"#555"}},scales:{y:{beginAtZero:true,ticks:{callback:v=>v===0?"0":(v/10000).toFixed(0)+"만",font:{size:10}},grid:{color:"#f0ebe0"}},x:{grid:{display:false},ticks:{font:{size:11}}}}}}));
  },60);
  return wrap;
}

// ── 메인 렌더 ────────────────────────────────────────────
function render(){
  const root=document.getElementById("app");
  root.innerHTML="";

  const hdr=h("header",{});
  hdr.appendChild(D({},[Sp({className:"logo"},["이지플라톤"]),Sp({className:"logo-sub"},["교습 시간표 · 교습비 · 출결"]),Sp({className:"ver-badge"},["v5"])]));
  const hdrRight=D({className:"hdr-right",style:{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}});
  if(S.saveStatus){
    const ok=S.saveStatus.startsWith("✅")||S.saveStatus.startsWith("🌐");
    hdrRight.appendChild(Sp({className:"save-badge",style:{color:ok?"#3a9a5c":"#e05a5a",background:ok?"#eafaf2":"#fff0f0"}},[S.saveStatus]));
  }
  hdrRight.appendChild(Bt({className:"btn btn-ghost no-print",onClick:openExportModal},["📤 내보내기"]));
  hdrRight.appendChild(Bt({className:"btn btn-ghost no-print",onClick:()=>window.print()},["🖨️ 인쇄"]));
  hdrRight.appendChild(Bt({className:"btn btn-ghost no-print",onClick:openFeeModal},["⚙️ 기본 교습비"]));
  hdrRight.appendChild(Bt({className:"btn btn-green no-print",onClick:sharedLoad},["🌐 공유 불러오기"]));
  hdrRight.appendChild(Bt({className:"btn btn-primary no-print",onClick:sharedSave},["🌐 공유 저장"]));
  hdr.appendChild(hdrRight);root.appendChild(hdr);

  const mainEl=h("main",{});
  const tabNav=D({className:"tab-nav no-print"});
  [["tt","📅 시간표"],["att","📋 출결"],["chart","📈 통계"]].forEach(([key,label])=>{
    tabNav.appendChild(Bt({className:"tab-btn"+(S.tab===key?" active":""),onClick:()=>{S.tab=key;render();}},[label]));
  });
  mainEl.appendChild(tabNav);

  if(S.tab==="tt")mainEl.appendChild(renderTT());
  else if(S.tab==="att")mainEl.appendChild(renderAtt());
  else mainEl.appendChild(renderChart());

  root.appendChild(mainEl);
}

// ── 초기화 ───────────────────────────────────────────────
initLoad();
</script>
